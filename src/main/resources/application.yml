server:
  port: 8080

spring:
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# JWT Configuration
jwt:
  secret: 9a4f2c8d3b7a1e5f8c6d4b2a1f3e5d7c9a4f2c8d3b7a1e5f8c6d4b2a1f3e5d7c
  expiration: 86400000

# Swagger UI Configuration
springdoc:
  swagger-ui:
    custom-css: /swagger-theme.css
    syntax-highlight:
      theme: monokai

# File Upload Configuration
file:
  upload-dir: uploads
